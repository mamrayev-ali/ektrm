# .codex/config.toml (AgentKit Core)
# Project-scoped Codex configuration.
# Keep secrets out of the repo. Use user-level config or OAuth flows where required.

model = "gpt-5.3-codex"
model_reasoning_effort = "high"

# AgentKit prefers explicit approval for high-impact operations.
# Keep this conservative for safety/audit.
approval_policy = "on-request"

# --- MCP Servers (required) ---
# NOTE: Endpoints below are the canonical hosted MCP servers for these tools.
# filesystem: local file access inside repo
# figma: design references / tokens / components
# notion: PRD/specs/tasks context
# openaiDeveloperDocs: authoritative OpenAI docs lookup
# playwright: browser automation for UI verification

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem@latest", "--allowed-directories", "."]

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]
