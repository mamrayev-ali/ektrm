      retries: 8

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:8080"
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  postgres-data:
  redis-data:
  minio-data:
