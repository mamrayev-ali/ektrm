      context: .
      dockerfile: services/runtime/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: certificates-service
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
