name: verify-ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - ticket/**
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run verify-ci
        run: make verify-ci
