      retries: 8

  notifications-service:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: notifications-service
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8088/realms/ektrm}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8088/realms/ektrm,http://keycloak:8080/realms/ektrm}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_INTERNAL_JWKS_URL:-http://keycloak:8080/realms/ektrm/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ektrm-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ektrm-web}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
    ports:
      - "${NOTIFICATIONS_PORT:-8085}:8000"
    depends_on:
