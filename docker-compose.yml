x-runtime-test-env: &runtime-test-env
  APP_ENV: ${APP_ENV:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MINIO_ENDPOINT: minio:9000
  KEYCLOAK_URL: http://keycloak:8080
  KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8088/realms/ektrm}
  KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8088/realms/ektrm,http://keycloak:8080/realms/ektrm}
  KEYCLOAK_JWKS_URL: ${KEYCLOAK_INTERNAL_JWKS_URL:-http://keycloak:8080/realms/ektrm/protocol/openid-connect/certs}
  KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ektrm-api}
  KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ektrm-web}
  AUTH_REQUIRED: ${AUTH_REQUIRED:-true}

x-runtime-test-base: &runtime-test-base
  build:
    context: .
    dockerfile: services/runtime/Dockerfile.test
  profiles: ["test"]
  environment: *runtime-test-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started
    keycloak:
      condition: service_started
    minio-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ektrm}
      POSTGRES_USER: ${POSTGRES_USER:-ektrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_EXPOSE_PORT:-6432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ektrm} -d ${POSTGRES_DB:-ektrm}"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_EXPOSE_PORT:-7379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_EXPOSE_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_EXPOSE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do
          echo "Waiting for MinIO..."
          sleep 2
        done;
        mc mb -p local/${MINIO_BUCKET_FILES:-ektrm-files} || true;
        mc mb -p local/${MINIO_BUCKET_PDF:-ektrm-pdf} || true;
        echo "MinIO bootstrap complete."
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change_me}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command: ["start-dev", "--http-port=8080", "--import-realm"]
    ports:
      - "${KEYCLOAK_EXPOSE_PORT:-8088}:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy

  gateway-service:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: gateway-service
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8088/realms/ektrm}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8088/realms/ektrm,http://keycloak:8080/realms/ektrm}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_INTERNAL_JWKS_URL:-http://keycloak:8080/realms/ektrm/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ektrm-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ektrm-web}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
    ports:
      - "${GATEWAY_PORT:-8180}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 8

  applications-service:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: applications-service
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8088/realms/ektrm}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8088/realms/ektrm,http://keycloak:8080/realms/ektrm}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_INTERNAL_JWKS_URL:-http://keycloak:8080/realms/ektrm/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ektrm-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ektrm-web}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
    ports:
      - "${APPLICATIONS_PORT:-8081}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 8

  applications-test:
    <<: *runtime-test-base
    environment:
      <<: *runtime-test-env
      SERVICE_NAME: applications-service
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-p", "test_application*.py"]

  gateway-test:
    <<: *runtime-test-base
    environment:
      <<: *runtime-test-env
      SERVICE_NAME: gateway-service
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-p", "test_auth.py"]

  certificates-test:
    <<: *runtime-test-base
    environment:
      <<: *runtime-test-env
      SERVICE_NAME: certificates-service
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-p", "test_certificate*.py"]

  reference-data-test:
    <<: *runtime-test-base
    environment:
      <<: *runtime-test-env
      SERVICE_NAME: reference-data-service
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-p", "test_reference_data.py"]

  files-test:
    <<: *runtime-test-base
    environment:
      <<: *runtime-test-env
      SERVICE_NAME: files-service
    command: ["python", "-m", "unittest", "discover", "-s", "tests", "-p", "test_files_api.py"]

  runtime-tests:
    <<: *runtime-test-base
    environment:
      <<: *runtime-test-env
      SERVICE_NAME: gateway-service

  certificates-service:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: certificates-service
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8088/realms/ektrm}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8088/realms/ektrm,http://keycloak:8080/realms/ektrm}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_INTERNAL_JWKS_URL:-http://keycloak:8080/realms/ektrm/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ektrm-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ektrm-web}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
    ports:
      - "${CERTIFICATES_PORT:-8082}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 8

  reference-data-service:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: reference-data-service
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8088/realms/ektrm}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8088/realms/ektrm,http://keycloak:8080/realms/ektrm}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_INTERNAL_JWKS_URL:-http://keycloak:8080/realms/ektrm/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ektrm-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ektrm-web}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
    ports:
      - "${REFERENCE_DATA_PORT:-8083}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 8

  files-service:
    build:
      context: .
      dockerfile: services/runtime/Dockerfile
    restart: unless-stopped
    environment:
      SERVICE_NAME: files-service
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://localhost:8088/realms/ektrm}
      KEYCLOAK_ALLOWED_ISSUERS: ${KEYCLOAK_ALLOWED_ISSUERS:-http://localhost:8088/realms/ektrm,http://keycloak:8080/realms/ektrm}
      KEYCLOAK_JWKS_URL: ${KEYCLOAK_INTERNAL_JWKS_URL:-http://keycloak:8080/realms/ektrm/protocol/openid-connect/certs}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-ektrm-api}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-ektrm-web}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
    ports:
      - "${FILES_PORT:-8084}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
