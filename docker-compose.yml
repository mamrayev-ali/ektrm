      interval: 10s
      timeout: 5s
      retries: 8

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      FRONTEND_API_BASE: ${FRONTEND_API_BASE:-}
      FRONTEND_OIDC_AUTHORITY: ${FRONTEND_OIDC_AUTHORITY:-}
      FRONTEND_OIDC_CLIENT_ID: ${FRONTEND_OIDC_CLIENT_ID:-ektrm-web}
      FRONTEND_GATEWAY_PORT: ${GATEWAY_PORT:-8180}
      FRONTEND_KEYCLOAK_PORT: ${KEYCLOAK_EXPOSE_PORT:-8088}
    ports:
      - "${FRONTEND_PORT:-9035}:8080"
    depends_on:
      gateway-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  postgres-data:
  redis-data:
  minio-data:
